baseURL = 'https://example.org/'
languageCode = 'en-us'
title = 'Gravity'
theme = 'rusty-typewriter'

[caches]
  [caches.images]
    dir = ':cacheDir/images'

[rusty_typewriter]
 [params.rtwt]
  sidePane = true
  countPageItems = 7 
  searchPath = 'search'
 [params.rtwt.home]
  showBio = true
  showAuthorImg = false
  sidePaneTags = true
  showFeatured = true
  showRecent = true
  hideRecentWhenFeatured = true
  countRecent = 5
 [params.rtwt.side.home]
  sidePaneSticky = false 
  taxonomies = ['tags']
  countTaxonomy = 6
 [params.rtwt.side.list]
  sidePaneSticky = false
 [params.rtwt.side.single]
  sidePaneSticky = true 
  showDetails = true
  showTableOfContents = true
  showAttachments = true
  showRelated = true
  countRelated = 5

  [taxonomies]
 tag = 'tags'

[params]
 summaryLength = 1
 math = true

[params.links]
 hugo = 'https://gohugo.io/'
 theme = 'https://github.com/math-queiroz/rusty-typewriter'

[[menus.main]]
 name = 'Project'
 pageRef = '/posts'
 weight = 1

[[menus.main]]
name = 'Reverse Classroom'
pageRef = '/climbing.md'
weight = 2

[module]
 [module.hugoVersion]
  extended = false
  min = "0.116.0"

[markup]
  [markup.goldmark]
    [markup.goldmark.extensions]
      [markup.goldmark.extensions.passthrough]
        enable = true
        [markup.goldmark.extensions.passthrough.delimiters]
          block = [['\[', '\]'], ['$$', '$$']]
          inline = [['\(', '\)']]